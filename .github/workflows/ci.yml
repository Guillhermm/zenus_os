name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('packages/**/pyproject.toml') }}

      - name: Install packages
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet
          .venv/bin/pip install -e packages/visualization --quiet
          .venv/bin/pip install -e packages/core --quiet
          .venv/bin/pip install -e packages/cli --quiet
          .venv/bin/pip install -e packages/tui --quiet
          .venv/bin/pip install pytest pytest-cov pytest-asyncio --quiet

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check packages/
